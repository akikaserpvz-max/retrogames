<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroJuegos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">🎮 RetroJuegos</div>

    <div class="buscador">
        <input type="text" id="buscar" placeholder="Buscar...">
        <button onclick="buscarJuego()">🔍</button>
    </div>

    <div class="carritoHeader">
        🛒 <span id="cantidadCarrito">0</span>
    </div>

</header>

<main>

    <section class="filtros">

        <h2>Épocas</h2>

        <div class="epocas">
            <button onclick="seleccionarEpoca('antigua')">Antigua</button>
            <button onclick="seleccionarEpoca('medieval')">Medieval</button>
            <button onclick="seleccionarEpoca('moderna')">Moderna</button>
            <button onclick="seleccionarEpoca('futurista')">Futurista</button>
        </div>

    </section>

    <h2>Principales resultados</h2>

    <div id="catalogo"></div>

    <div class="masJuegos">
        <button id="btnMas" onclick="cargarMas()">Más juegos</button>
    </div>

    <section class="carrito">

        <h2>🛒 Carrito</h2>

        <div id="listaCarrito"></div>

        <p id="total"><b>Total: USD 0</b></p>

        <button onclick="irAPago()">Pagar</button>

    </section>

</main>

<script src="script.js?v=999"></script>

</body>
</html>
