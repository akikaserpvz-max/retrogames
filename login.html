<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroJuegos - Iniciar sesión</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="loginBody">

    <div class="loginOverlay"></div>

    <div class="loginCard">

        <div class="loginLogo">
            <h1>RETROJUEGOS</h1>
            <p class="sub">
                Accede a tu biblioteca de juegos
            </p>
        </div>

        <div class="loginForm">

            <label>USUARIO</label>
            <input
                type="text"
                id="user"
                placeholder="Ingresa tu usuario">

            <label>CONTRASEÑA</label>
            <input
                type="password"
                id="pass"
                placeholder="Ingresa tu contraseña">

            <button onclick="login()">
                Iniciar sesión
            </button>

            <p id="error"></p>

        </div>

    </div>

    <script>

        function login() {

            const usuario =
                document.getElementById("user")
                .value
                .trim();

            const clave =
                document.getElementById("pass")
                .value
                .trim();

            if (!usuario || !clave) {

                document.getElementById("error")
                    .textContent =
                    "Completa todos los campos.";

                return;
            }

            localStorage.setItem(
                "login",
                "true"
            );

            localStorage.setItem(
                "usuario",
                usuario
            );

            window.location.href =
                "index.html";
        }

    </script>

</body>

</html>
